<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saeed's Bar & Grill — Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: 'Inter', Arial, sans-serif;
            background: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
            background-image: radial-gradient(ellipse at top, #1a0a00 0%, #111 70%);
        }
        .logo { width: 440px; max-width: 90vw; margin-bottom: 2rem; }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 1rem;
        }
        .tagline {
            font-size: 1.05rem;
            font-weight: 300;
            color: #aaa;
            letter-spacing: 0.5px;
            margin-bottom: 2rem;
        }
        .badge {
            display: inline-block;
            background: #8B4513;
            color: #fff;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 0.55rem 1.5rem;
            border-radius: 100px;
            margin-bottom: 2.5rem;
        }
        .divider {
            width: 60px;
            height: 2px;
            background: #8B4513;
            margin: 0 auto 2.5rem;
        }
        .info { font-size: 0.95rem; color: #888; line-height: 2.2; }
        .info a { color: #e8c99a; text-decoration: none; }
        .info a:hover { text-decoration: underline; }
        footer {
            position: fixed;
            bottom: 1.5rem;
            left: 0; right: 0;
            font-size: 0.72rem;
            color: #444;
            text-align: center;
        }
        footer a { color: #555; text-decoration: none; }
        footer a:hover { color: #888; }
    </style>
</head>
<body>
    <img src="https://raw.githubusercontent.com/RCeasar01/SaeedsLKN/main/saeeds_logo_trans.png" alt="Saeed's Bar & Grill" class="logo">
    <h1>Something Great Is Coming</h1>
    <p class="tagline">Great food &middot; Cold drinks &middot; Good times &mdash; Est. 1998</p>
    <div class="badge">New Website Under Construction</div>
    <div class="divider"></div>
    <div class="info">
        <p>&#128205; 20832 Catawba Ave, Cornelius, NC 28031</p>
        <p><a href="https://www.facebook.com/SaeedsKaraokeBarandGrill/" target="_blank">&#128997; Follow us on Facebook</a></p>
    </div>
    <footer>Developed by <a href="https://bannedproductmedia.com" target="_blank">BannedProductMediaInc.</a></footer>
</body>
</html>
